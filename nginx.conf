events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 3600s;
    keepalive_requests 10000;
    client_body_timeout 3600s;
    client_header_timeout 3600s;
    send_timeout 3600s;
    proxy_read_timeout 86400s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;

    proxy_buffering off;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_cache off;
    proxy_set_header X-Accel-Buffering no;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream xray_backend {
        server 127.0.0.1:10000;
        keepalive 32;
    }

    server {
        listen 8080;
        server_name _;

        location = /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # DECOY LOCATION - Placeholders for deploy.sh to replace
        location / {
            proxy_pass https://CLEAN_DECOY;
            proxy_set_header Host CLEAN_DECOY;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_http_version 1.1;
            
            # Optional: resolve using DECOY_IP if needed
            # resolver 8.8.8.8;
            # set $backend DECOY_IP;
            # proxy_pass https://$backend;
        }

        location /saeka {
            proxy_pass http://xray_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_set_header X-Accel-Buffering no;
            proxy_read_timeout 86400s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
        }

        location / {
            return 404;
        }
    }
}
